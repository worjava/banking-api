databaseChangeLog:
  - changeSet:
      id: 002-create-cards
      author: y.sterkhov
      logicalFilePath: db/changelog/db.changelog-master.yaml
      changes:
        - createTable:
            tableName: cards
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: encrypted_number
                  type: VARCHAR(512)
                  constraints:
                    nullable: false
              - column:
                  name: number_hash
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: last_four
                  type: VARCHAR(4)
                  constraints:
                    nullable: false
              - column:
                  name: owner_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: expiration_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: balance
                  type: DECIMAL(19, 2)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: cards
            baseColumnNames: owner_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_cards_owner
        - createIndex:
            tableName: cards
            indexName: idx_cards_owner_status
            columns:
              - column:
                  name: owner_id
              - column:
                  name: status
        - createIndex:
            tableName: cards
            indexName: idx_cards_owner_last_four
            columns:
              - column:
                  name: owner_id
              - column:
                  name: last_four
        - createIndex:
            tableName: cards
            indexName: idx_cards_status_expiration
            columns:
              - column:
                  name: status
              - column:
                  name: expiration_date
