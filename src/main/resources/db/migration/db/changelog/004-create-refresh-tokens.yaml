databaseChangeLog:
  - changeSet:
      id: 004-create-refresh-tokens
      author: y.sterkhov
      logicalFilePath: db/changelog/db.changelog-master.yaml
      changes:
        - createTable:
            tableName: refresh_tokens
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: token_hash
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: revoked_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: refresh_tokens
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_refresh_tokens_user
        - createIndex:
            tableName: refresh_tokens
            indexName: idx_refresh_tokens_user_revoked
            columns:
              - column:
                  name: user_id
              - column:
                  name: revoked_at
        - createIndex:
            tableName: refresh_tokens
            indexName: idx_refresh_tokens_expires_at
            columns:
              - column:
                  name: expires_at
